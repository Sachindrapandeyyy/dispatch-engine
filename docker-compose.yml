version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dispatch_postgres
    restart: always
    environment:
      POSTGRES_USER: dispatch_user
      POSTGRES_PASSWORD: dispatch_password
      POSTGRES_DB: dispatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dispatch_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  redis_data:
